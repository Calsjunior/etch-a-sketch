<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Etch-a-Sketch</title>
        <link rel="stylesheet" href="style.css">
        <script src="script.js" defer></script>
    </head>
    <body>

        <div class="sketch-container">
            <div id="title">
                <h1>Etch-a-Sketch</h1>
            </div>

            <div class="sketch-wrapper">
                <form>
                    <input autofocus class="grid-size" placeholder="Enter grid size" type="text">
                    <button>Add size</button>
                </form>

                <p class="display-size">None</p>

                <div class="grid-container"></div>
            </div>

            <div class="color-mode">
                <label>Pick a color
                    <input class="color-picker" type="color">
                </label>
                <label>Enable rainbow mode
                    <div class="rainbow-mode"></div>
                </label>
            </div>
        </div>

    </body>
</html>
