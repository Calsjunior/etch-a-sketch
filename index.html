<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Etch-a-Sketch</title>
        <link rel="stylesheet" href="style.css">
        <script src="script.js" defer></script>
    </head>
    <body>
        <div class="sketch">
            <header class="sketch__header">
                <h1 class="sketch__title">Etch-a-Sketch</h1>
            </header>

            <div class="sketch__body">
                <input class="sketch__input" placeholder="Enter grid size" type="text">
                <button class="sketch__button" type="button">Add size</button>

                <p class="sketch__display">None</p>

                <div class="grid"></div>
            </div>

            <footer class="sketch__controls control">
                <div class="control__item">
                    <label class="control__label" for="color">Pick a color</label>
                    <input class="control__input" type="color" id="color">
                </div>

                <div class="control__item">
                    <label class="control__label" for="rainbow">Rainbow mode</label>
                    <div
                        class="control__input control__input--rainbow"
                        id="rainbow"
                    ></div>
                </div>
            </footer>
        </div>
    </body>
</html>
